<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'; connect-src 'self' http://127.0.0.1:5000 http://localhost:5000;">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diet Suggestions - AI Health Assistant</title>
    <link rel="stylesheet" href="../css/dashboard-new.css">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand"><div class="sidebar-brand-icon">🏥</div><span class="sidebar-brand-name">HealthAI</span></div>
            <nav class="sidebar-nav">
                <div class="sidebar-section-title">Menu</div>
                <a href="dashboard.html" class="sidebar-link"><span class="sidebar-icon">📊</span>Dashboard</a>
                <a href="appointments.html" class="sidebar-link"><span class="sidebar-icon">📅</span>Appointments</a>
                <a href="health-tracking.html" class="sidebar-link"><span class="sidebar-icon">💓</span>Health Tracking</a>
                <a href="diet-suggestions.html" class="sidebar-link active"><span class="sidebar-icon">🥗</span>Diet Plans</a>
                <a href="exercise.html" class="sidebar-link"><span class="sidebar-icon">🏃</span>Exercise</a>
                <a href="reports.html" class="sidebar-link"><span class="sidebar-icon">📋</span>Reports</a>
                <div class="sidebar-section-title">General</div>
                <a href="#" class="sidebar-link"><span class="sidebar-icon">⚙️</span>Settings</a>
                <a href="#" class="sidebar-link" onclick="window.healthAssistant.logoutUser()"><span class="sidebar-icon">🚪</span>Logout</a>
            </nav>
        </aside>

        <div class="main-content">
            <header class="topbar">
                <div style="display:flex;align-items:center;gap:1rem;">
                    <button class="hamburger" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
                    <div class="topbar-search"><span class="topbar-search-icon">🔍</span><input type="text" placeholder="Search..."></div>
                </div>
                <div class="topbar-actions">
                    <div class="topbar-user">
                        <div class="topbar-avatar" id="userAvatar">U</div>
                        <div class="topbar-user-info">
                            <span class="topbar-user-name" id="topbarUserName">User</span>
                            <span class="topbar-user-email" id="topbarUserEmail"></span>
                        </div>
                    </div>
                </div>
            </header>

            <main class="page-content">
                <div class="page-header">
                    <div class="page-header-info">
                        <h1>Diet Suggestions</h1>
                        <p>Get personalized AI-powered nutrition recommendations</p>
                    </div>
                </div>

                <!-- Diet Form -->
                <div class="card" style="margin-bottom:1.5rem;">
                    <div class="card-header"><span class="card-title">Get Personalized Diet Recommendations</span></div>
                    <form id="dietForm">
                        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem;">
                            <div class="form-group">
                                <label for="age">Age</label>
                                <input type="number" id="age" required placeholder="e.g. 25" min="1" max="120">
                            </div>
                            <div class="form-group">
                                <label for="gender">Gender</label>
                                <select id="gender" required>
                                    <option value="">Select</option>
                                    <option value="male">Male</option>
                                    <option value="female">Female</option>
                                    <option value="other">Other</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="condition">Health Condition</label>
                                <select id="condition" required>
                                    <option value="normal">Normal / Healthy</option>
                                    <option value="diabetes">Diabetes</option>
                                    <option value="hypertension">Hypertension</option>
                                </select>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary">Get Recommendations</button>
                    </form>
                </div>

                <!-- Results -->
                <div class="card" id="dietResults" style="display: none;">
                    <div class="card-header"><span class="card-title">Your Diet Recommendations</span></div>
                    <div id="dietContent"></div>
                </div>
            </main>
        </div>
    </div>

    <script src="../js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            if (!window.healthAssistant || !window.healthAssistant.isAuthenticated()) {
                window.location.href = 'login.html'; return;
            }
            const userName = localStorage.getItem('userName') || 'User';
            const userData = JSON.parse(localStorage.getItem('userData') || '{}');
            document.getElementById('topbarUserName').textContent = userName;
            document.getElementById('topbarUserEmail').textContent = userData.email || '';
            document.getElementById('userAvatar').textContent = userName.charAt(0).toUpperCase();
        });

        document.getElementById('dietForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const age = document.getElementById('age').value;
            const gender = document.getElementById('gender').value;
            const condition = document.getElementById('condition').value;

            try {
                const result = await window.healthAssistant.getDietRecommendations(age, gender, condition);
                if (result) {
                    let html = '';
                    const rec = result.recommendations || result;
                    if (typeof rec === 'object' && !Array.isArray(rec)) {
                        ['breakfast', 'lunch', 'dinner', 'snacks'].forEach(meal => {
                            const items = rec[meal];
                            if (items && items.length) {
                                html += `<h4 style="color:var(--primary-green);margin:1rem 0 0.5rem;">${meal.charAt(0).toUpperCase() + meal.slice(1)}</h4>`;
                                items.forEach(m => {
                                    const name = m.name || m;
                                    const desc = m.description ? ` — ${m.description}` : '';
                                    html += `<div class="health-item"><div class="health-item-icon steps">🥗</div><div class="health-item-info"><div class="health-item-name">${name}</div><div class="health-item-date">${desc}</div></div></div>`;
                                });
                            }
                        });
                        if (rec.daily_goals) {
                            html += `<p style="margin-top:1rem;color:var(--text-secondary);">Daily goals: Calories ${rec.daily_goals.calories || '-'}, Protein ${rec.daily_goals.proteins || '-'}g</p>`;
                        }
                    } else if (Array.isArray(rec)) {
                        rec.forEach(r => html += `<div class="health-item"><div class="health-item-icon steps">✅</div><div class="health-item-info"><div class="health-item-name">${r}</div></div></div>`);
                    }
                    document.getElementById('dietContent').innerHTML = html || '<p style="color:var(--text-muted);">No recommendations available.</p>';
                    document.getElementById('dietResults').style.display = 'block';
                }
            } catch (error) {
                console.error('Error getting diet recommendations:', error);
            }
        });
    </script>
</body>
</html>
