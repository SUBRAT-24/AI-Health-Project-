<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'; connect-src 'self' http://127.0.0.1:5000 http://localhost:5000;">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appointments - AI Health Assistant</title>
    <link rel="stylesheet" href="../css/dashboard-new.css">
</head>

<body>
    <div class="app-layout">

        <!-- SIDEBAR -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <div class="sidebar-brand-icon">🏥</div>
                <span class="sidebar-brand-name">HealthAI</span>
            </div>
            <nav class="sidebar-nav">
                <div class="sidebar-section-title">Menu</div>
                <a href="dashboard.html" class="sidebar-link"><span class="sidebar-icon">📊</span>Dashboard</a>
                <a href="appointments.html" class="sidebar-link active"><span class="sidebar-icon">📅</span>Appointments</a>
                <a href="health-tracking.html" class="sidebar-link"><span class="sidebar-icon">💓</span>Health Tracking</a>
                <a href="diet-suggestions.html" class="sidebar-link"><span class="sidebar-icon">🥗</span>Diet Plans</a>
                <a href="exercise.html" class="sidebar-link"><span class="sidebar-icon">🏃</span>Exercise</a>
                <a href="reports.html" class="sidebar-link"><span class="sidebar-icon">📋</span>Reports</a>
                <div class="sidebar-section-title">General</div>
                <a href="#" class="sidebar-link"><span class="sidebar-icon">⚙️</span>Settings</a>
                <a href="#" class="sidebar-link" onclick="window.healthAssistant.logoutUser()"><span class="sidebar-icon">🚪</span>Logout</a>
            </nav>
        </aside>

        <!-- MAIN -->
        <div class="main-content">
            <header class="topbar">
                <div style="display:flex;align-items:center;gap:1rem;">
                    <button class="hamburger" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
                    <div class="topbar-search">
                        <span class="topbar-search-icon">🔍</span>
                        <input type="text" placeholder="Search appointments...">
                    </div>
                </div>
                <div class="topbar-actions">
                    <div class="topbar-user">
                        <div class="topbar-avatar" id="userAvatar">U</div>
                        <div class="topbar-user-info">
                            <span class="topbar-user-name" id="topbarUserName">User</span>
                            <span class="topbar-user-email" id="topbarUserEmail">user@health.com</span>
                        </div>
                    </div>
                </div>
            </header>

            <main class="page-content">
                <!-- Header -->
                <div class="page-header">
                    <div class="page-header-info">
                        <h1>Appointments</h1>
                        <p>Schedule and manage your doctor appointments</p>
                    </div>
                    <div class="page-header-actions">
                        <button class="btn btn-primary" onclick="openBookModal()">+ Book Appointment</button>
                    </div>
                </div>

                <!-- Appointments Table -->
                <div class="card">
                    <div class="card-header">
                        <span class="card-title">Your Appointments</span>
                    </div>
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Doctor</th>
                                <th>Specialization</th>
                                <th>Date & Time</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="appointmentsBody">
                            <tr>
                                <td colspan="5" style="text-align: center; padding: 2rem; color: var(--text-muted);">Loading...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>

    <!-- Book Modal -->
    <div id="bookModal" class="modal-overlay">
        <div class="modal-card">
            <button class="modal-close" onclick="closeBookModal()">×</button>
            <h2>Book Appointment</h2>
            <form id="appointmentForm">
                <div class="form-group">
                    <label for="doctorName">Doctor Name</label>
                    <input type="text" id="doctorName" required placeholder="Dr. Smith">
                </div>
                <div class="form-group">
                    <label for="specialization">Specialization</label>
                    <select id="specialization" required>
                        <option value="">Select Specialization</option>
                        <option value="Cardiologist">Cardiologist</option>
                        <option value="Dermatologist">Dermatologist</option>
                        <option value="Neurologist">Neurologist</option>
                        <option value="Pediatrician">Pediatrician</option>
                        <option value="General Practitioner">General Practitioner</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="appointmentDate">Date & Time</label>
                    <input type="datetime-local" id="appointmentDate" required>
                </div>
                <div class="form-group">
                    <label for="reason">Reason for Visit</label>
                    <textarea id="reason" rows="3" placeholder="Describe your reason for visit..."></textarea>
                </div>
                <button type="submit" class="auth-submit-btn">Book Appointment</button>
            </form>
        </div>
    </div>

    <script src="../js/main.js"></script>
    <script src="appointments.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const userName = localStorage.getItem('userName') || 'User';
            const userData = JSON.parse(localStorage.getItem('userData') || '{}');
            document.getElementById('topbarUserName').textContent = userName;
            document.getElementById('topbarUserEmail').textContent = userData.email || '';
            document.getElementById('userAvatar').textContent = userName.charAt(0).toUpperCase();
        });
    </script>
</body>
</html>
