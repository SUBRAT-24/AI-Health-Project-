<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'; connect-src 'self' http://127.0.0.1:5000 http://localhost:5000;">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports - AI Health Assistant</title>
    <link rel="stylesheet" href="../css/dashboard-new.css">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand"><div class="sidebar-brand-icon">🏥</div><span class="sidebar-brand-name">HealthAI</span></div>
            <nav class="sidebar-nav">
                <div class="sidebar-section-title">Menu</div>
                <a href="dashboard.html" class="sidebar-link"><span class="sidebar-icon">📊</span>Dashboard</a>
                <a href="appointments.html" class="sidebar-link"><span class="sidebar-icon">📅</span>Appointments</a>
                <a href="health-tracking.html" class="sidebar-link"><span class="sidebar-icon">💓</span>Health Tracking</a>
                <a href="diet-suggestions.html" class="sidebar-link"><span class="sidebar-icon">🥗</span>Diet Plans</a>
                <a href="exercise.html" class="sidebar-link"><span class="sidebar-icon">🏃</span>Exercise</a>
                <a href="reports.html" class="sidebar-link active"><span class="sidebar-icon">📋</span>Reports</a>
                <div class="sidebar-section-title">General</div>
                <a href="#" class="sidebar-link"><span class="sidebar-icon">⚙️</span>Settings</a>
                <a href="#" class="sidebar-link" onclick="window.healthAssistant.logoutUser()"><span class="sidebar-icon">🚪</span>Logout</a>
            </nav>
        </aside>

        <div class="main-content">
            <header class="topbar">
                <div style="display:flex;align-items:center;gap:1rem;">
                    <button class="hamburger" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
                    <div class="topbar-search"><span class="topbar-search-icon">🔍</span><input type="text" placeholder="Search reports..."></div>
                </div>
                <div class="topbar-actions">
                    <div class="topbar-user">
                        <div class="topbar-avatar" id="userAvatar">U</div>
                        <div class="topbar-user-info">
                            <span class="topbar-user-name" id="topbarUserName">User</span>
                            <span class="topbar-user-email" id="topbarUserEmail"></span>
                        </div>
                    </div>
                </div>
            </header>

            <main class="page-content">
                <div class="page-header">
                    <div class="page-header-info">
                        <h1>Medical Reports</h1>
                        <p>Upload and manage your medical documents</p>
                    </div>
                    <div class="page-header-actions">
                        <button class="btn btn-primary" onclick="openUploadModal()">+ Upload Report</button>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <span class="card-title">Your Reports</span>
                    </div>
                    <div id="reportsList">
                        <p style="text-align: center; color: var(--text-muted); padding: 2rem;">Loading reports...</p>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Upload Modal -->
    <div id="uploadModal" class="modal-overlay">
        <div class="modal-card">
            <button class="modal-close" onclick="closeUploadModal()">×</button>
            <h2>Upload Medical Report</h2>
            <form id="uploadForm">
                <div class="form-group">
                    <label for="reportFile">Select File</label>
                    <input type="file" id="reportFile" required accept=".pdf,.jpg,.jpeg,.png,.doc,.docx">
                </div>
                <div class="form-group">
                    <label for="reportDescription">Description</label>
                    <textarea id="reportDescription" rows="3" placeholder="e.g. Blood Test Report - Feb 2026"></textarea>
                </div>
                <button type="submit" class="auth-submit-btn">Upload</button>
            </form>
        </div>
    </div>

    <script src="../js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            if (!window.healthAssistant || !window.healthAssistant.isAuthenticated()) {
                window.location.href = 'login.html'; return;
            }
            const userName = localStorage.getItem('userName') || 'User';
            const userData = JSON.parse(localStorage.getItem('userData') || '{}');
            document.getElementById('topbarUserName').textContent = userName;
            document.getElementById('topbarUserEmail').textContent = userData.email || '';
            document.getElementById('userAvatar').textContent = userName.charAt(0).toUpperCase();
            loadReports();
        });

        document.getElementById('uploadForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const file = document.getElementById('reportFile').files[0];
            const description = document.getElementById('reportDescription').value;

            if (!file) {
                window.healthAssistant.showToast('Please select a file', 'error');
                return;
            }

            try {
                await window.healthAssistant.uploadReport(file, description);
                closeUploadModal();
                document.getElementById('uploadForm').reset();
                loadReports();
            } catch (error) {
                console.error('Error uploading report:', error);
            }
        });

        async function loadReports() {
            try {
                const reports = await window.healthAssistant.getReports();
                const container = document.getElementById('reportsList');

                if (reports && reports.length > 0) {
                    let html = '<table class="data-table"><thead><tr><th>Description</th><th>Type</th><th>Date</th><th>Status</th></tr></thead><tbody>';
                    reports.forEach(report => {
                        const date = report.uploaded_at || report.upload_date;
                        const dateStr = date ? new Date(date).toLocaleDateString('en-US', { dateStyle: 'medium' }) : 'N/A';
                        html += `<tr>
                            <td>${report.description || 'No description'}</td>
                            <td>${report.report_type || 'General'}</td>
                            <td>${dateStr}</td>
                            <td><span class="health-item-status normal">${report.status || 'Uploaded'}</span></td>
                        </tr>`;
                    });
                    html += '</tbody></table>';
                    container.innerHTML = html;
                } else {
                    container.innerHTML = '<p style="text-align: center; color: var(--text-muted); padding: 2rem;">No reports uploaded yet. Click "Upload Report" to add your first report.</p>';
                }
            } catch (error) {
                console.error('Error loading reports:', error);
            }
        }

        function openUploadModal() {
            const modal = document.getElementById('uploadModal');
            modal.style.display = 'flex'; modal.classList.add('active');
        }

        function closeUploadModal() {
            const modal = document.getElementById('uploadModal');
            modal.style.display = 'none'; modal.classList.remove('active');
        }

        window.addEventListener('click', function (e) {
            const modal = document.getElementById('uploadModal');
            if (e.target === modal) closeUploadModal();
        });
    </script>
</body>
</html>
